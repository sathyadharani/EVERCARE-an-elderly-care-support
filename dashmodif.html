<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverCare Dashboard</title>
    <style>
        /*
        * Note: The full CSS is not provided in this prompt, but this structure assumes 
        * the original CSS imports and styling for the container, header, logo, and dashboard layout
        * are present to maintain the intended interface style.
        */
        @import url('https://fonts.googleapis.com/css2?family=Junge&display=swap');
        body {
            background-color: #F5FFDC;
            font-family: 'Junge', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container {
            width: calc(100% - 1in);
            height: calc(100% - 1in);
            background-color: #F5FFDC;
            border: 1px solid black;
            padding: 20px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .header {
            width: calc(100% - 20px);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 10px;
            background-color: #DCE5B2;
            border-bottom: 1px solid black;
            position: absolute;
            top: 0;
            left: 0;
        }
        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 5px;
        }
        .logo img {
            width: 257px;
            height: 180px;
            margin-bottom: 15px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 0;
            width: 100%;
            position: absolute;
            bottom: 0px;
            left: 0px;
            right: 35px;
        }
        .dashboard div {
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid black;
            padding: 10px;
            font-size: 16px;
            text-align: center;
            height: 150px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .dashboard div:hover {
            background-color: #d0e4a1;
        }
        .green {
            background-color: #F5FFDC;
        }
        .light-green {
            background-color: #E9F5C5;
            /* Placeholder for background image */
            /* You would place your actual image here if available: url('...') */
            color: black;
        }
        .medium-green {
            background-color: #B2C985;
            /* Placeholder for background image */
            /* You would place your actual image here if available: url('...') */
            color: black;
        }
        .dark-green {
            background-color: #8EA76D;
            /* Placeholder for background image */
            /* You would place your actual image here if available: url('...') */
            color: black;
        }
         .light-green img, .medium-green img, .dark-green img {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span id="userNameHeader">NAME OF USER</span>
        </div>
        <div class="logo">
            <img src="mandala.png" alt="EverCare Logo">
        </div>
        <div class="dashboard">
            <div class="green" onclick="window.location.href='appform.html'">SCHEDULE AN APPOINTMENT</div>
            <div class="medium-green"></div>
            <div class="green" onclick="window.location.href='userprofile.html'">MY PROFILE</div>
            <div class="light-green"></div>
            <div class="green" onclick="window.location.href='volprofiles.html'">VOLUNTEER PROFILES</div>
            <div class="dark-green" onclick="logout()">LOGOUT</div>
        </div>
    </div>

    <script>
        // This function runs when the page loads
        document.addEventListener("DOMContentLoaded", function() {
            // Check if the user is logged in by looking for the stored token or name
            const token = localStorage.getItem('token');
            const userName = localStorage.getItem('userName');
            const userNameHeader = document.getElementById('userNameHeader');

            if (token && userName) {
                // If both are found, the user is authenticated and the name is displayed
                userNameHeader.textContent = userName;
            } else {
                // If the token or name is missing, the user is not logged in.
                userNameHeader.textContent = "Not Logged In";
                alert("You are not logged in. Redirecting to login page.");
                // Redirects user to the login page to start a new session
                window.location.href = 'userlogin.html'; 
            }
        });

        // Function to handle logging out
        function logout() {
            // Clear the token and user name from storage to end the session
            localStorage.removeItem('token');
            localStorage.removeItem('userName');
            
            // Send the user back to the home page (where they can choose to log in again)
            alert("You have been logged out.");
            window.location.href = 'homepg.html';
        }
    </script>
</body>
</html>
