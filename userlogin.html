<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - EverCare</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Junge&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* 1. UPDATED BACKGROUND IMAGE PATH */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            
            /* Make sure the image is in the same folder as this HTML file */
            background-image: url('user_login_bg.jpg.jpeg'); 
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 2. GLASS CONTAINER */
        .outer-container {
            width: calc(100% - 1in);
            height: calc(100% - 1in);
            
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 15px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1); 
            
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3. INNER FORM BOX */
        .inner-rectangle {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 50%;
            max-width: 500px;
        }

        h2 {
            font-family: 'Junge', serif;
            font-size: 2.5em;
            color: #333;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .form-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .form-group {
            display: flex;
            align-items: center;
            width: 100%;
            margin-top: 25px;
        }

        label {
            font-weight: bold;
            width: 30%;
            text-align: right;
            margin-right: 15px;
        }

        input {
            font-family: 'Lato', sans-serif;
            flex-grow: 1;
            border: none;
            border-bottom: 2px solid #ccc;
            background-color: transparent;
            padding: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-bottom-color: #8EA76D;
        }

        /* 4. BUTTON STYLE */
        .btn {
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            background-color: #8EA76D; 
            color: white;
            border: none;
            border-radius: 5px;
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease-out;
            margin-top: 40px;
            width: 100%;
        }

        .btn:hover {
            background-color: #7a915d; 
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        /* 5. MODAL POPUP */
        .modal-overlay {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; 
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center; 
            align-items: center;
        }

        .modal-content {
            background-color: #fff; 
            padding: 30px; 
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2); 
            text-align: center;
            font-family: 'Lato', sans-serif; 
            max-width: 400px; 
            width: 90%;
        }

        #modalCloseBtn {
            font-family: 'Lato', sans-serif; 
            font-weight: 700; 
            background-color: #8EA76D; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            padding: 10px 20px;
            font-size: 14px; 
            cursor: pointer; 
            transition: all 0.2s ease-out; 
            margin-top: 20px;
        }

        #modalCloseBtn:hover { 
            background-color: #7a915d; 
        }
    </style>
</head>
<body>
    <div class="outer-container">
        <div class="inner-rectangle">
            <h2>USER LOGIN</h2>
            <div class="form-container">
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit" class="btn">LOGIN</button>
                </form>
            </div>
        </div>
    </div>

    <div id="customAlert" class="modal-overlay">
        <div class="modal-content">
            <p id="modalMessage">This is an alert!</p>
            <button id="modalCloseBtn">OK</button>
        </div>
    </div>

    <script>
        // MODAL ALERT LOGIC
        const modal = document.getElementById('customAlert');
        const modalMessage = document.getElementById('modalMessage');
        const modalCloseBtn = document.getElementById('modalCloseBtn');

        function customAlert(message) {
            modalMessage.textContent = message;
            modal.style.display = "flex";
        }

        modalCloseBtn.onclick = function() {
            modal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
        
        // FORM SUBMISSION LOGIC
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userName', data.userName);

                    window.location.href = 'dashmodif.html';
                } else {
                    customAlert('Login failed. Please check your email and password.');
                }
            } catch (error) {
                console.error('Error:', error);
                customAlert('An error occurred. Please try again.');
            }
        });
    </script>
</body>
</html>
