<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Rewards</title>
    <style>
        /* Using the same CSS as your original file for consistency */
        @import url('https://fonts.googleapis.com/css2?family=Junge&display=swap');
        body { background-color: #F5FFDC; font-family: 'Junge', serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 0; box-sizing: border-box; }
        .container { width: calc(100% - 1in); height: calc(100% - 1in); background-color: #F5FFDC; border: 1px solid black; padding: 20px; box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1); position: relative; display: flex; flex-direction: column; align-items: center; }
        .header { width: calc(100% - 20px); display: flex; justify-content: flex-end; align-items: center; padding: 10px; background-color: #DCE5B2; border-bottom: 1px solid black; position: absolute; top: 0; left: 0; }
        .logo { position: absolute; top: 30px; left: 20px; }
        .logo img { width: 150px; height: auto; }
        .title { margin-top: 80px; font-size: 22px; font-weight: bold; text-align: center; }
        .profiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 20px; width: 80%; justify-content: center; }
        .profile-card:nth-child(5) { grid-column: 2 / 3; }
        .profile-card:nth-child(6) { grid-column: 3 / 4; }
        .profile-card { background-color: #DCE5B2; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1); }
        .profile-card img { width: 80px; height: 80px; }
        .profile-card p { margin: 5px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span id="volunteerNameHeader">NAME OF VOLUNTEER</span>
        </div>
        <div class="logo">
            <img src="mandala.png" alt="EverCare Logo">
        </div>
        <div class="title">VOLUNTEER REWARDS</div>
        <div class="profiles">
            <div class="profile-card"> <img src="reward.png" alt="Reward 1"> <p><b>Reward 1</b></p> <p>Description of Reward 1</p> </div>
            <div class="profile-card"> <img src="reward.png" alt="Reward 2"> <p><b>Reward 2</b></p> <p>Description of Reward 2</p> </div>
            <div class="profile-card"> <img src="reward.png" alt="Reward 3"> <p><b>Reward 3</b></p> <p>Description of Reward 3</p> </div>
            <div class="profile-card"> <img src="reward.png" alt="Reward 4"> <p><b>Reward 4</b></p> <p>Description of Reward 4</p> </div>
            <div class="profile-card"> <img src="reward.png" alt="Reward 5"> <p><b>Reward 5</b></p> <p>Description of Reward 5</p> </div>
            <div class="profile-card"> <img src="reward.png" alt="Reward 6"> <p><b>Reward 6</b></p> <p>Description of Reward 6</p> </div>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // --- CRITICAL: Check for volunteer-specific keys ---
            const volunteerName = localStorage.getItem('volunteerName');
            const volunteerToken = localStorage.getItem('volunteerToken');

            if (volunteerName && volunteerToken) {
                document.getElementById('volunteerNameHeader').textContent = volunteerName;
            } else {
                alert("Please log in to view rewards.");
                window.location.href = 'vollogin.html';
            }
        });
    </script>
</body>
</html>
