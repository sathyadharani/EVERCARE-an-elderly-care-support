<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Junge&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Junge&display=swap');
        body { background-color: #F5FFDC; font-family: 'Junge', serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 0; box-sizing: border-box; }
        .container { width: calc(100% - 1in); height: calc(100% - 1in); background-color: #F5FFDC; border: 1px solid black; padding: 20px; box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1); display: flex; flex-direction: column; align-items: center; position: relative; }
        .header { display: flex; align-items: center; justify-content: center; width: 100%; position: relative; margin-bottom: 20px; }
        .logo { position: absolute; left: 20px; top: 10px; }
        .logo img { width: 220px; }
        h2 { text-align: center; flex-grow: 1; margin: 0; font-size: 24px; position: relative; top: 60px; }
        .form-container { display: flex; flex-direction: column; align-items: center; width: 60%; margin-top: 40px; }
        .form-group { display: flex; align-items: center; width: 100%; margin-top: 35px; }
        label { font-weight: bold; white-space: nowrap; width: 35%; text-align: right; margin-right: 15px; }
        label::after { content: ":"; margin-right: 10px; }
        input { flex-grow: 1; width: calc(100% + 1.5in); border: none; border-bottom: 1px solid black; background-color: transparent; padding: 5px; outline: none; }
        .btn { display: block; width: 150px; padding: 8px; margin: 50px auto 0; border: 1px solid black; background: none; cursor: pointer; text-align: center; }
        .btn:hover { background-color: black; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="mandala.png" alt="EverCare Logo">
            </div>
            <h2>VOLUNTEER REGISTRATION</h2>
        </div>
        <div class="form-container">
            <form id="volunteerRegistrationForm">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" id="name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Contact No</label>
                    <input type="tel" name="contact" id="contact" pattern="[0-9]{10}" required
                           title="Please enter exactly 10 digits for the contact number">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" id="password" required>
                </div>
                <button type="submit" class="btn">SIGN UP</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('volunteerRegistrationForm').addEventListener('submit', async function (event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const contact = document.getElementById('contact').value;
            const password = document.getElementById('password').value;
            const phonePattern = /^[0-9]{10}$/;
            if (!phonePattern.test(contact)) {
                alert('Contact No must be exactly 10 digits.');
                return;
            }
            try {
                const response = await fetch('/api/auth/volunteer/register', { // No full URL needed when served from same host
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, contact, password })
                });
                if (response.ok) {
                    alert('Volunteer registration successful! Please log in.');
                    window.location.href = 'vollogin.html'; 
                } else {
                    const data = await response.json();
                    alert('Registration failed: ' + (data.msg || 'Please try again.'));
                }
            } catch (error) {
                console.error('Network Error:', error);
                alert('An error occurred. Please ensure the backend server is running.');
            }
        });
    </script>
</body>
</html>
