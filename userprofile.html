<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Junge&display=swap');

        body {
            background-color: #F5FFDC;
            font-family: 'Junge', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            width: calc(100% - 1in);
            height: calc(100% - 1in);
            background-color: #F5FFDC;
            border: 1px solid black;
            padding: 20px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: calc(100% - 20px);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 10px;
            background-color: #DCE5B2;
            border-bottom: 1px solid black;
            position: absolute;
            top: 0;
            left: 0;
        }

        .logo {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .logo img {
            width: 257px;
            height: 180px;
        }

        .profile-pic {
            position: absolute;
            top: 220px;
            left: 71px;
        }

        .profile-pic img {
            width: 160px;
            height: 160px;
            background-color: #F5FFDC;
        }

        .profile-title {
            font-size: 20px;
            font-weight: bold;
            margin-top: 80px;
            text-align: center;
        }

        .profile-info {
            width: 30%;
            margin-top: 45px;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 23px;
            align-items: flex-start;
        }

        .profile-info p {
            margin: 0px;
            font-size: 16px;
            width: 100%;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 29px;
        }

        .buttons button {
            background-color: #E9F5C5;
            color: black;
            padding: 8px 16px;
            border: 1px solid black;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Junge', serif;
            font-size: 14px;
        }

        .separator {
            width: 80%;
            height: 1px;
            background-color: black;
            margin-top: 20px;
        }

        .helpline {
            text-align: center;
            margin-top: 41px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span id="userNameHeader">Loading...</span>
        </div>

        <div class="logo">
            <img src="mandala.png" alt="EverCare Logo">
        </div>

        <div class="profile-pic">
            <img src="profile.png" alt="Profile Picture">
        </div>

        <div class="profile-title">USER PROFILE</div>

        <div class="profile-info">
            <p><b>Name:</b> <span id="profileName">Loading...</span></p>
        </div>

        <div class="buttons">
            <button onclick="redirectTo('myappoint.html')">MY APPOINTMENTS</button>
            <button onclick="signOut()">SIGN OUT</button>
        </div>

        <div class="separator"></div>

        <div class="helpline">
            <p><b>OUR HELPLINE INFORMATION</b></p>
            <p>📞 9xxxxxxxxx / 9xxxxxxxxx</p>
            <p>📧 evercareofficial.help@gmail.com</p>
            <p>📷 @evercare_official</p>
        </div>
    </div>

    <script>
        // Display user's name from localStorage
        const userName = localStorage.getItem('userName');
        document.getElementById('userNameHeader').textContent = userName || 'NAME OF USER';
        document.getElementById('profileName').textContent = userName || '-';

        // Redirect function
        function redirectTo(page) {
            window.location.href = page;
        }

        // Sign out function
        function signOut() {
            localStorage.clear();
            window.location.href = 'homepg.html';
        }
    </script>
</body>
</html>
