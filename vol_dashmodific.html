<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverCare Volunteer Dashboard</title>
    <style>
        /* This is the original CSS from your project */
        @import url('https://fonts.googleapis.com/css2?family=Junge&display=swap');
        body {
            background-color: #F5FFDC;
            font-family: 'Junge', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container {
            width: calc(100% - 1in);
            height: calc(100% - 1in);
            background-color: #F5FFDC;
            border: 1px solid black; /* Original black border */
            padding: 20px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .header {
            width: calc(100% - 20px);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 10px;
            background-color: #DCE5B2;
            border-bottom: 1px solid black; /* Original black border */
            position: absolute;
            top: 0;
            left: 0;
        }
        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 5px;
        }
        .logo img {
            width: 257px;
            height: 180px;
            margin-bottom: 15px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 0;
            width: 100%;
            position: absolute;
            bottom: 0px;
            left: 0px;
            right: 35px;
        }
        .dashboard div {
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid black; /* Original black border */
            padding: 10px;
            font-size: 16px;
            text-align: center;
            height: 150px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .dashboard div:hover {
            background-color: #d0e4a1;
        }
        .green {
            background-color: #F5FFDC;
        }
        .light-green {
            background-color: #E9F5C5;
        }
        .medium-green {
            background-color: #B2C985;
        }
        .dark-green {
            background-color: #8EA76D;
        }
    </style>
    
    <script src="/socket.io/socket.io.js"></script>

</head>
<body>
    <div class="container">
        <div class="header">
            <span id="volunteerNameHeader">NAME OF VOLUNTEER</span>
        </div>
        <div class="logo">
            <img src="mandala.png" alt="EverCare Logo">
        </div>
        <div class="dashboard">
            <div class="green" onclick="window.location.href='volmyapp.html'">MY APPOINTMENTS</div>
            <div class="medium-green"></div>
            <div class="green" onclick="window.location.href='rewards.html'">MY REWARDS</div>
            <div class="light-green"></div>
            <div class="green" onclick="window.location.href='volmyprof.html'">VOLUNTEER PROFILE</div>
            <div class="dark-green" onclick="logout()">LOGOUT</div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Checks for VOLUNTEER token and name
            const volunteerName = localStorage.getItem('volunteerName');
            const volunteerToken = localStorage.getItem('volunteerToken');

            if (volunteerName && volunteerToken) {
                document.getElementById('volunteerNameHeader').textContent = volunteerName;

                // Socket.io logic
                const socket = io(); 
                socket.emit('join_volunteer_room', volunteerName);

                socket.on('new_appointment_notification', (data) => {
                    // Uses the original alert() popup
                    alert(
                        `NEW APPOINTMENT!\n\n` +
                        `Client: ${data.clientName}\n` +
                        `Service: ${data.purpose}\n` +
                        `Date: ${data.date} at ${data.time}`
                    );
                });

            } else {
                document.getElementById('volunteerNameHeader').textContent = "Not Logged In";
                // Uses the original alert() popup
                alert("You are not logged in. Redirecting to login page.");
                window.location.href = 'vollogin.html';
            }
        });

        function logout() {
            // Removes VOLUNTEER token and name
            localStorage.removeItem('volunteerToken');
            localStorage.removeItem('volunteerName');
            // Uses the original alert() popup
            alert("You have been logged out.");
            window.location.href = 'homepg.html';
        }
    </script>
</body>
</html>
